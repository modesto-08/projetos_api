<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Feriados 2024 🇧🇷</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center mb-4">Feriados Nacionais 2024 🇧🇷</h1>

    <!-- Tabela -->
    <table class="table table-striped table-hover text-center">
        <thead class="table-dark">
            <tr>
                <th>Data</th>
                <th>Feriado</th>
            </tr>
        </thead>

        <!-- Corpo vazio -->
        <tbody id="tabelaFeriados"></tbody>
    </table>
</div>

<script>
    // Executa quando a página carrega
    window.onload = function() {
        fetch('https://brasilapi.com.br/api/feriados/v1/2024')
            .then(response => response.json())
            .then(feriados => {

                const tabela = document.getElementById('tabelaFeriados');

                // Percorre cada feriado
                feriados.forEach(feriado => {

                    // Cria uma linha
                    const linha = document.createElement('tr');

                    // Cria as colunas
                    const data = document.createElement('td');
                    const nome = document.createElement('td');

                    data.textContent = formatarData(feriado.date);
                    nome.textContent = feriado.name;

                    // Adiciona na linha
                    linha.appendChild(data);
                    linha.appendChild(nome);

                    // Adiciona na tabela
                    tabela.appendChild(linha);
                });
            })
            .catch(error => {
                console.log('Erro:', error);
            });
    };

    // Função para formatar data (YYYY-MM-DD → DD/MM/YYYY)
    function formatarData(data) {
        const partes = data.split("-");
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }
</script>

</body>
</html>
